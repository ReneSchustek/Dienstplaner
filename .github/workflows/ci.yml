name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code-Qualität (PHP 8.3 / Symfony 7)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dienstplaner_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v5

      - name: PHP 8.3 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, curl, zip
          tools: composer:v2

      - name: Composer-Cache laden
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Security-Audit
        run: composer audit

      - name: Umgebungsvariablen für Tests setzen
        run: |
          echo "DATABASE_URL=mysql://root:root@127.0.0.1:3306/dienstplaner_test" >> $GITHUB_ENV
          echo "APP_ENV=test" >> $GITHUB_ENV
          echo "APP_SECRET=test-secret-for-ci-only" >> $GITHUB_ENV

      - name: Datenbank für Tests vorbereiten
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Code-Style prüfen
        run: composer cs-check

      - name: Statische Analyse (PHPStan Level 8)
        run: composer phpstan

      - name: Tests ausführen
        run: composer test
